name: Test

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test.yml"
      - "Dockerfile"
      - "entrypoint.sh"
      - "code-sandbox"
      - "code-sandbox.ab"
      - ".githooks/pre-commit"
      - "setup-hooks.sh"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  shell-and-launcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shell syntax checks
        run: |
          bash -n entrypoint.sh
          bash -n code-sandbox

      - name: Shellcheck
        run: shellcheck -x entrypoint.sh

  docker-smoke:
    runs-on: ubuntu-latest
    needs: shell-and-launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (with GHCR cache)
        run: |
          docker pull "${GHCR_IMAGE}" || true
          docker build --cache-from "${GHCR_IMAGE}" -t code-sandbox:test .

      - name: Entrypoint smoke test
        run: |
          docker run --rm code-sandbox:test bash -lc '
            id code >/dev/null
            test -x /usr/local/bin/entrypoint.sh
            command -v mise >/dev/null
            command -v codex >/dev/null
            command -v claude >/dev/null
            command -v gemini >/dev/null
            command -v opencode >/dev/null
          '

  mise-language-smoke:
    runs-on: ubuntu-latest
    needs: docker-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (with GHCR cache)
        run: |
          docker pull "${GHCR_IMAGE}" || true
          docker build --cache-from "${GHCR_IMAGE}" -t code-sandbox:test .

      - name: Verify mise language installs and basic builds
        run: |
          docker run --rm -e SANDBOX_LANGUAGES=all code-sandbox:test bash -lc '
            set -euo pipefail

            mise which php >/dev/null
            mise which go >/dev/null
            mise which rustc >/dev/null
            mise which ruby >/dev/null
            mise which java >/dev/null
            mise which python >/dev/null
            mise which zig >/dev/null
            mise which erl >/dev/null
            mise which elixir >/dev/null

            php -r "echo \"php-ok\\n\";"

            cat > /tmp/main.go << "EOF"
            package main
            import "fmt"
            func main() { fmt.Println("go-ok") }
            EOF
            go build -o /tmp/go-ok /tmp/main.go
            /tmp/go-ok | grep -q "go-ok"

            cat > /tmp/main.rs << "EOF"
            fn main() { println!("rust-ok"); }
            EOF
            rustc /tmp/main.rs -o /tmp/rust-ok
            /tmp/rust-ok | grep -q "rust-ok"

            ruby -e "puts \"ruby-ok\"" | grep -q "ruby-ok"

            cat > /tmp/Main.java << "EOF"
            public class Main { public static void main(String[] args) { System.out.println("java-ok"); } }
            EOF
            javac /tmp/Main.java
            java -cp /tmp Main | grep -q "java-ok"

            python -c "print(\"python-ok\")" | grep -q "python-ok"

            cat > /tmp/main.zig << "EOF"
            const std = @import("std");
            pub fn main() !void {
              const out = std.io.getStdOut().writer();
              try out.print("zig-ok\\n", .{});
            }
            EOF
            zig build-exe /tmp/main.zig -femit-bin=/tmp/zig-ok
            /tmp/zig-ok | grep -q "zig-ok"

            cat > /tmp/hello.erl << "EOF"
            -module(hello).
            -export([main/0]).
            main() -> io:format("erlang-ok~n"), halt().
            EOF
            erlc -o /tmp /tmp/hello.erl
            erl -noshell -pa /tmp -s hello main | grep -q "erlang-ok"

            cat > /tmp/main.ex << "EOF"
            IO.puts("elixir-ok")
            EOF
            elixir /tmp/main.ex | grep -q "elixir-ok"
          '
